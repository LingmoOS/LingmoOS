name: Test

permissions: write-all

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    name: Building System
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'

      - uses: actions/checkout@v4

      - name: Update source
        run: sudo apt update

      - name: Install base packages
        run: sudo apt install -y sudo tree dctrl-tools devscripts wget isolinux syslinux binutils build-essential diffutils gcc g++ bash patch gzip bzip2 perl tar cpio unzip rsync file bc findutils make sed python3 cvs git mercurial subversion libncurses5 asciidoc w3m dblatex python3-aiohttp python3-matplotlib graphviz

      - name: Init build
        run: cp -v system/non-kernel .config

      - name: Get Core Sources Code
        run: |
            rm -r core/lpm
            git clone https://github.com/LingmoOS/lpm
            tar -Jcvf lpm.tar.xz lpm/
            mv lpm.tar.xz core/
            rm -r lpm/
      
      - name: Build System
        run: make -j4
      
      - name: Check output
        run: |
            ls output/
            tree output/
      
      - name: Make release
        run: |
            tar -Jcvf build_output.tar.xz output/images/

      - name: Read Upload
        run: |
            mkdir artifact/
            # find build-sys -type f -name "*.iso" -exec mv {} artifact/ \;
            sudo mv build_output.tar.xz artifact/

      - name: Artifact - Release
        uses: actions/upload-artifact@v4
        with:
          name: artifact
          path: ${{ github.workspace }}/artifact/*
          compression-level: 9 # maximum compression
          if-no-files-found: error # 'warn' or 'ignore' are also available, defaults to `warn`
