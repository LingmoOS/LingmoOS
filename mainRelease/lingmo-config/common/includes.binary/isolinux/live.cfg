menu hshift 0
menu width 82
include stdmenu.cfg

label live-6.10.7-amd64
        menu label ^Boot Lingmo OS (Live)
        menu default
        linux /live/vmlinuz-6.10.7-amd64
        initrd /live/initrd.img-6.10.7-amd64
        append boot=live components quiet splash noeject

label live-6.10.7-amd64-failsafe
        menu label Boot Lingmo OS (fail-safe mode)
        linux /live/vmlinuz-6.10.7-amd64
        initrd /live/initrd.img-6.10.7-amd64
        append boot=live components noeject memtest noapic noapm nodma nomce nolapic nomodeset nosmp nosplash vga=normal

label live-forensic
        menu label Boot Lingmo OS (^forensic mode)
        linux /live/vmlinuz-6.10.7-amd64
        initrd /live/initrd.img-6.10.7-amd64
        append boot=live username=lingmo hostname=lingmo systemd.swap=no noautomount

label live-persistence
        menu label Boot Lingmo OS with ^USB persistence  (check lingmo.org/prst)
        linux /live/vmlinuz-6.10.7-amd64
        initrd /live/initrd.img-6.10.7-amd64
        append boot=live username=lingmo hostname=lingmo persistence

label live-encrypted-persistence
	menu label Boot Lingmo OS with USB ^Encrypted persistence
        linux /live/vmlinuz-6.10.7-amd64
        initrd /live/initrd.img-6.10.7-amd64
        append boot=live persistent=cryptsetup persistence-encryption=luks username=lingmo hostname=lingmo persistence

