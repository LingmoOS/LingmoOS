Dependencies:
- 'on': ['@all']
  'require':
    'frameworks/ocean-icons': '@latest-kf6'
    'frameworks/extra-cmake-modules': '@latest-kf6'
    'frameworks/kcmutils': '@latest-kf6'
    'frameworks/kconfig': '@latest-kf6'
    'frameworks/kconfigwidgets': '@latest-kf6'
    'frameworks/kcoreaddons': '@latest-kf6'
    'frameworks/kcrash': '@latest-kf6'
    'frameworks/kdeclarative': '@latest-kf6'
    'frameworks/kdoctools': '@latest-kf6'
    'frameworks/kglobalaccel': '@latest-kf6'
    'frameworks/ki18n': '@latest-kf6'
    'frameworks/kidletime': '@latest-kf6'
    'frameworks/knewstuff': '@latest-kf6'
    'frameworks/knotifications': '@latest-kf6'
    'frameworks/kpackage': '@latest-kf6'
    'frameworks/kservice': '@latest-kf6'
    'frameworks/ksvg': '@latest-kf6'
    'frameworks/kwidgetsaddons': '@latest-kf6'
    'frameworks/kwindowsystem': '@latest-kf6'
    'frameworks/kxmlgui': '@latest-kf6'
    'libraries/libqaccessibilityclient': '@latest-kf6'
    'libraries/lingmo-wayland-protocols': '@latest-kf6'
    'lingmo/ocean': '@same'
    'lingmo/lingmo-activities': '@same'
    'lingmo/kdecoration': '@same'
    'lingmo/kglobalacceld': '@same'
    'lingmo/kpipewire': '@same'
    'lingmo/kscreenlocker': '@same'
    'lingmo/kwayland': '@same'
    'third-party/wayland': '@latest'
    'third-party/wayland-protocols': '@latest'

RuntimeDependencies:
- 'on': ['@all']
  'require':
    'frameworks/lingmoui': '@latest-kf6'
    'lingmo/liblingmo': '@same'
    'lingmo/lingmo-workspace': '@same' # kscreenlocker needs it

Options:
  ctest-arguments: '--repeat until-pass:5'
  use-ccache: True
  require-passing-tests-on: ['FreeBSD', 'Linux']
