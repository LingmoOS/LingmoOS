Dependencies:
- 'on': ['@all']
  'require':
    'frameworks/extra-cmake-modules': '@latest-kf6'
    'frameworks/kconfig': '@latest-kf6'
    'frameworks/kcoreaddons': '@latest-kf6'
    'frameworks/ki18n': '@latest-kf6'
    'frameworks/kio': '@latest-kf6'
    'frameworks/kitemmodels': '@latest-kf6'
    'frameworks/knotifications': '@latest-kf6'
    'frameworks/kpackage': '@latest-kf6'
    'frameworks/kservice': '@latest-kf6'
    'frameworks/kwindowsystem': '@latest-kf6'
    'frameworks/modemmanager-qt': '@latest-kf6'
    'frameworks/networkmanager-qt': '@latest-kf6'
    'frameworks/kjobwidgets': '@latest-kf6'
    'lingmo/kwayland': '@same'
    'lingmo/libkscreen': '@same'
    'lingmo/liblingmo': '@same'
    'lingmo/kwin': '@same'
    'lingmo/lingmo-workspace': '@same'
    'libraries/lingmoui-addons': '@latest-kf6'
Options:
  require-passing-tests-on: [ 'Linux', 'FreeBSD']

RuntimeDependencies:
- 'on': ['Linux']
  'require':
    'lingmo/lingmo-nm': '@same'
    'lingmo/lingmo-pa': '@same'
    'lingmo/bluedevil': '@same'
    'lingmo/milou': '@same'
    'lingmo/qqc2-ocean-style': '@same'
    'frameworks/bluez-qt': '@latest-kf6'
- 'on': ['Linux', 'FreeBSD']
  'require':
    'lingmo/milou' : '@same'
