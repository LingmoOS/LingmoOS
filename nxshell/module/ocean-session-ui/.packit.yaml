# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: rpm/lingmo-session-ui.spec

# add or remove files that should be synced
synced_files:
    - rpm/lingmo-session-ui.spec
    - .packit.yaml

upstream_package_name: ocean-session-ui
# downstream (Fedora) RPM package name
downstream_package_name: lingmo-session-ui

actions:
  fix-spec-file: |
    bash -c "sed -i -r \"s/Version:(\s*)\S*/Version:\1${PACKIT_PROJECT_VERSION}/\" rpm/lingmo-session-ui.spec"
  post-upstream-clone: |
    cp rpm/ocean-session-ui.spec rpm/lingmo-session-ui.spec
