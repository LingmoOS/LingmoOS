# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: rpm/lingmo-icon-theme.spec

# add or remove files that should be synced
synced_files:
    - rpm/lingmo-icon-theme.spec
    - .packit.yaml

upstream_package_name: lingmo-icon-theme
# downstream (Fedora) RPM package name
downstream_package_name: lingmo-icon-theme

actions:
  fix-spec-file: |
    bash -c "sed -i -r \"0,/Version:/ s/Version:(\s*)\S*/Version:\1${PACKIT_PROJECT_VERSION}/\" rpm/lingmo-icon-theme.spec"
