# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: rpm/lingmo-launcher.spec

# add or remove files that should be synced
synced_files:
    - rpm/lingmo-launcher.spec
    - .packit.yaml

upstream_package_name: ocean-launcher
# downstream (Fedora) RPM package name
downstream_package_name: lingmo-launcher

actions:
  fix-spec-file: |
    bash -c "sed -i -r \"s/Version:(\s*)\S*/Version:\1${PACKIT_PROJECT_VERSION}/\" rpm/lingmo-launcher.spec"
  post-upstream-clone: |
    cp rpm/ocean-launcher.spec rpm/lingmo-launcher.spec
