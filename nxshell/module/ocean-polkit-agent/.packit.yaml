# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: rpm/lingmo-polkit-agent.spec

# add or remove files that should be synced
synced_files:
    - rpm/lingmo-polkit-agent.spec
    - .packit.yaml

upstream_package_name: ocean-polkit-agent
# downstream (Fedora) RPM package name
downstream_package_name: lingmo-polkit-agent

actions:
  fix-spec-file: |
    bash -c "sed -i -r \"0,/Version:/ s/Version:(\s*)\S*/Version:\1${PACKIT_PROJECT_VERSION}/\" rpm/lingmo-polkit-agent.spec"
  post-upstream-clone: |
    cp rpm/ocean-polkit-agent.spec rpm/lingmo-polkit-agent.spec

