# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: rpm/lingmo-draw.spec

# add or remove files that should be synced
synced_files:
    - rpm/lingmo-draw.spec
    - .packit.yaml

upstream_package_name: lingmo-draw
# downstream (Fedora) RPM package name
downstream_package_name: lingmo-draw

actions:
  fix-spec-file: |
    bash -c "sed -i -r \"s/Version:(\s*)\S*/Version:\1${PACKIT_PROJECT_VERSION}/\" rpm/lingmo-draw.spec"
