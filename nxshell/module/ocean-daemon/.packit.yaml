# See the documentation for more information:
# https://packit.dev/docs/configuration/

specfile_path: rpm/lingmo-daemon.spec

# add or remove files that should be synced
synced_files:
    - rpm/lingmo-daemon.spec
    - .packit.yaml

upstream_package_name: ocean-daemon
# downstream (Fedora) RPM package name
downstream_package_name: lingmo-daemon

actions:
  fix-spec-file: |
    bash -c "sed -i -r \"s/Version:(\s*)\S*/Version:\1${PACKIT_PROJECT_VERSION}/\" rpm/lingmo-daemon.spec"
  post-upstream-clone: |
    cp rpm/ocean-daemon.spec rpm/lingmo-daemon.spec
